<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITANA TSARA - RS-X2 Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl p-6 space-y-6">
        
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-500">VITANA TSARA</h1>
            <p class="text-xs text-slate-400 font-medium tracking-widest uppercase">RS-X2 PREDICTION SYSTEM</p>
        </div>

        <div class="grid grid-cols-2 gap-4 bg-slate-950 p-4 rounded-2xl border border-slate-800/50">
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Heure de départ</label>
                <input type="time" id="baseTime" value="11:34" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Cible Multiplicateur</label>
                <input type="number" id="targetMult" value="5.5" step="0.1" min="1" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
            </div>
            <button onclick="generatePredictions()" class="col-span-2 w-full mt-2 bg-gradient-to-r from-cyan-500 to-indigo-600 hover:from-cyan-600 hover:to-indigo-700 text-white text-sm font-semibold py-2.5 rounded-xl transition duration-200 cursor-pointer shadow-lg shadow-cyan-500/20">
                <i class="fa-solid fa-gear mr-2"></i>Kajio ny Matrix vaovao
            </button>
        </div>

        <div class="bg-slate-950 border border-slate-800/60 rounded-2xl p-4 space-y-3">
            <div class="text-xs font-semibold uppercase text-slate-400 tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-chart-simple text-cyan-400"></i> Indicateurs de Session
            </div>
            <div id="indicatorsContainer" class="grid grid-cols-3 gap-2">
                </div>
        </div>

        <div class="bg-slate-950 border border-slate-800/60 rounded-2xl p-4 space-y-4">
            <div class="flex items-center justify-between">
                <div class="text-xs font-semibold uppercase text-slate-400 tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-compass text-cyan-400"></i> Interprétation & Synthèse
                </div>
                <div class="flex items-center gap-2">
                    <span class="bg-slate-900 border border-slate-700 text-[10px] px-1.5 py-0.5 rounded text-slate-300 font-bold">🔵 FR</span>
                    <span id="configBadge" class="text-[10px] font-bold px-2 py-0.5 rounded-md"></span>
                </div>
            </div>

            <div class="space-y-2 text-xs text-slate-300">
                <p><strong>CYCLE :</strong> <span id="cycleText" class="text-slate-400"></span></p>
                <p><strong>TENDANCE :</strong> <span id="tendanceText" class="text-slate-400"></span></p>
                <p><strong>ZONE :</strong> <span id="zoneText" class="text-slate-400"></span></p>
            </div>

            <div id="synthBox" class="p-3 rounded-xl border text-xs">
                </div>

            <div class="p-3 bg-slate-900/50 border border-slate-800 rounded-xl text-xs flex gap-2 items-start">
                <span class="text-cyan-400 font-bold">CONSEIL :</span>
                <p id="conseilText" class="text-slate-300"></p>
            </div>

            <div id="starsContainer" class="flex justify-center gap-1 text-xs text-amber-400 pt-1">
                </div>
        </div>

        <div class="space-y-3">
            <div class="text-xs font-semibold uppercase text-slate-400 tracking-wider flex items-center gap-2 px-1">
                <i class="fa-solid fa-hourglass-half text-cyan-400"></i> Séquences Prédictives RS
            </div>
            <div id="cardsContainer" class="space-y-2.5">
                </div>
        </div>

    </div>

    <script>
        function generatePredictions() {
            const baseTimeInput = document.getElementById('baseTime').value;
            const targetMult = parseFloat(document.getElementById('targetMult').value) || 2.0;
            
            if (!baseTimeInput) return;
            
            const [hours, minutes] = baseTimeInput.split(':').map(Number);
            let currentMinutes = hours * 60 + minutes;

            // Seeded random number generator ho an'ny fahamatoran'ny algorithm
            const seed = Math.floor(targetMult * 12);
            
            // Toetry ny Indicateurs
            let cycleStatus = targetMult >= 50.0 ? "VARIABLE" : (seed % 2 === 0 ? "STABLE" : "FLUIDE");
            let tendanceStatus = targetMult >= 50.0 ? "NEUTRE" : (targetMult >= 5.0 ? "POSITIVE" : "STABLE");
            let zoneStatus = targetMult >= 50.0 ? "ÉLEVÉE" : (targetMult >= 5.0 ? "MOYENNE" : "FAIBLE");

            updateIndicateursUI(cycleStatus, tendanceStatus, zoneStatus);
            updateInterpretationUI(targetMult, cycleStatus, tendanceStatus, zoneStatus);

            const cardsContainer = document.getElementById('cardsContainer');
            cardsContainer.innerHTML = '';

            for (let i = 1; i <= 4; i++) {
                // Elanelam-potoana kely (1 hatramin'ny 4 minitra)
                let deltaMinutes = 1 + ((seed + i * 7) % 4); 
                currentMinutes += deltaMinutes;

                let h = Math.floor(currentMinutes / 60) % 24;
                let m = currentMinutes % 60;
                let s = (seed * i * 13) % 60; 
                
                let timeString = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

                // Kajy mavitrika ny multiplicateur ho an'ny karatra tsirairay
                let cardMultiplier;
                if (targetMult >= 50.0) {
                    cardMultiplier = (targetMult * (0.6 + ((seed + i) % 5) / 10)).toFixed(2);
                } else if (targetMult >= 5.0) {
                    cardMultiplier = (targetMult * (0.5 + ((seed + i) % 6) / 10)).toFixed(2);
                } else if (targetMult >= 2.0) {
                    cardMultiplier = (targetMult * (0.7 + ((seed + i) % 4) / 10)).toFixed(2);
                } else {
                    cardMultiplier = (1.0 + ((seed + i) % 10) / 10).toFixed(2);
                }

                // Antsoina ilay fitsipika vaovao misy loko mifanaraka amin'ny multiplier
                const colorConfig = getCardColorAndStyle(parseFloat(cardMultiplier));

                const isFirst = (i === 1);
                const timeDisplayHTML = isFirst 
                    ? `<div class="bg-white text-slate-900 font-bold px-3 py-1 rounded-full text-xs shadow-md flex items-center gap-1.5 border border-slate-200">
                         <i class="fa-regular fa-clock text-slate-500 text-[11px]"></i> ${timeString}
                       </div>`
                    : `<span class="text-white font-bold tracking-wide">${timeString}</span>`;

                const cardHTML = `
                    <div class="relative overflow-hidden bg-gradient-to-r ${colorConfig.gradient} border ${colorConfig.border} rounded-2xl p-3.5 flex items-center justify-between transition-all duration-300 shadow-md">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-extrabold ${colorConfig.textBadge} bg-slate-950/40 px-2 py-0.5 rounded-md border border-white/5">RS-${i}</span>
                            ${timeDisplayHTML}
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <span class="text-[10px] block opacity-70 font-medium text-white/80">Prediction</span>
                                <span class="text-sm font-black text-white tracking-wide">${cardMultiplier}x</span>
                            </div>
                            <span class="bg-gradient-to-r from-red-600 to-red-800 text-white text-[9px] font-black px-2 py-1 rounded-full uppercase tracking-wider shadow-inner border border-red-500/20">Aviator</span>
                        </div>
                    </div>
                `;
                cardsContainer.innerHTML += cardHTML;
            }
        }

        // --- ALGORITHM SAFETY & COLOR SELECTION (Fitsipika vaovao) ---
        function getCardColorAndStyle(multiplier) {
            if (multiplier >= 50.0) {
                // 🟢 Vert (50.00x - 10000x)
                return {
                    gradient: "from-emerald-600 to-teal-700",
                    border: "border-emerald-500/30",
                    textBadge: "text-emerald-200"
                };
            } else if (multiplier >= 5.0) {
                // 💗 Rose (5.00x - 49.99x)
                return {
                    gradient: "from-pink-600 to-rose-700",
                    border: "border-pink-500/30",
                    textBadge: "text-pink-200"
                };
            } else if (multiplier >= 2.0) {
                // 🟣 Violet (2.00x - 4.99x)
                return {
                    gradient: "from-purple-600 to-indigo-700",
                    border: "border-purple-500/30",
                    textBadge: "text-purple-200"
                };
            } else {
                // 🔵 Bleu ciel (1.00x - 1.99x)
                return {
                    gradient: "from-cyan-600 to-blue-700",
                    border: "border-cyan-500/30",
                    textBadge: "text-cyan-200"
                };
            }
        }

        function updateIndicateursUI(cycle, tendance, zone) {
            const container = document.getElementById('indicatorsContainer');
            
            const getColor = (val) => {
                if (["STABLE", "POSITIVE", "FAIBLE"].includes(val)) return "border-emerald-500/20 text-emerald-400 bg-emerald-500/5";
                if (["FLUIDE", "STABLE", "MOYENNE"].includes(val)) return "border-cyan-500/20 text-cyan-400 bg-cyan-500/5";
                return "border-rose-500/20 text-rose-400 bg-rose-500/5";
            };

            container.innerHTML = `
                <div class="border rounded-xl p-2 text-center ${getColor(cycle)}">
                    <span class="text-[9px] block uppercase opacity-60 font-bold">Cycle</span>
                    <span class="text-xs font-black tracking-wide">${cycle}</span>
                </div>
                <div class="border rounded-xl p-2 text-center ${getColor(tendance)}">
                    <span class="text-[9px] block uppercase opacity-60 font-bold">Tendance</span>
                    <span class="text-xs font-black tracking-wide">${tendance}</span>
                </div>
                <div class="border rounded-xl p-2 text-center ${getColor(zone)}">
                    <span class="text-[9px] block uppercase opacity-60 font-bold">Zone</span>
                    <span class="text-xs font-black tracking-wide">${zone}</span>
                </div>
            `;
        }

        function updateInterpretationUI(target, cycle, tendance, zone) {
            const badge = document.getElementById('configBadge');
            const synthBox = document.getElementById('synthBox');
            
            if (target >= 50.0) {
                badge.className = "bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-md";
                badge.innerText = "HAUTE ZONE (50X+)";
                
                synthBox.className = "p-3 rounded-xl bg-emerald-950/20 border border-emerald-500/20 text-xs text-emerald-300";
                synthBox.innerHTML = "<strong>SYNTHÈSE :</strong> Famakafakana coefficient avo dia avo. Ilaina ny fitandremana satria somary miovaova ny lamina rehefa manatona ny tampony.";
                document.getElementById('conseilText').innerText = "Andraso ny fahatongavan'ny fotoana amin'ny segondra voatondro nefa asio fiarovana ambany.";
            } else if (target >= 5.0) {
                badge.className = "bg-pink-500/10 border border-pink-500/30 text-pink-400 text-[10px] font-bold px-2 py-0.5 rounded-md";
                badge.innerText = "EXCELLENTE CONFIGURATION";
                
                synthBox.className = "p-3 rounded-xl bg-pink-950/20 border border-pink-500/20 text-xs text-pink-300";
                synthBox.innerHTML = "<strong>SYNTHÈSE :</strong> Lamina tsara dia tsara ho an'ny Rose Coefficients. Mety tsara ho an'ny fampitomboana tombony.";
                document.getElementById('conseilText').innerText = "Araho tsara ny vinavina miaraka amin'ny fitantanana feno ny risika.";
            } else if (target >= 2.0) {
                badge.className = "bg-purple-500/10 border border-purple-500/30 text-purple-400 text-[10px] font-bold px-2 py-0.5 rounded-md";
                badge.innerText = "CONFIGURATION MODÉRÉE";
                
                synthBox.className = "p-3 rounded-xl bg-purple-950/20 border border-purple-500/20 text-xs text-purple-300";
                synthBox.innerHTML = "<strong>SYNTHÈSE :</strong> Salan-tsanda matetika mivoaka indrindra. Milamina ny tontolo ary azo antoka ny fidirana.";
                document.getElementById('conseilText').innerText = "Azo atao ny mivoaka amin'ny dingana voalohany mba hahazoana tombony haingana.";
            } else {
                badge.className = "bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 text-[10px] font-bold px-2 py-0.5 rounded-md";
                badge.innerText = "ZONE DE SÉCURITÉ BASSE";
                
                synthBox.className = "p-3 rounded-xl bg-cyan-950/20 border border-cyan-500/20 text-xs text-cyan-300";
                synthBox.innerHTML = "<strong>SYNTHÈSE :</strong> Multiplicateur ambany dia ambany. Ny risika dia kely saingy tsy mitondra fidirana lehibe.";
                document.getElementById('conseilText').innerText = "Mety amin'ny fanaovana andrana rafitra na fitsapana ny matrix fotsiny.";
            }

            document.getElementById('cycleText').innerText = cycle === "STABLE" ? "Rythme modéré et prévisible. Phase d'équilibre idéal." : "Fluctuations rapides observées. Prudence sur les décalages.";
            document.getElementById('tendanceText').innerText = tendance === "POSITIVE" ? "La parité des multiplicateurs est globalement favorable." : "Tendance neutre, observez les vagues de transition.";
            document.getElementById('zoneText').innerText = zone === "FAIBLE" ? "Le risque global est bas. L'environnement est sécurisé pour jouer." : "Zone de risque intermédiaire. Ajustez la taille des mises.";

            const starsContainer = document.getElementById('starsContainer');
            let starCount = target >= 5.0 && target < 50.0 ? 5 : (target >= 2.0 ? 4 : 3);
            starsContainer.innerHTML = Array(5).fill(0).map((_, i) => 
                `<i class="${i < starCount ? 'fa-solid' : 'fa-regular'} fa-star"></i>`
            ).join('');
        }

        window.onload = generatePredictions;
    </script>
</body>
</html>
